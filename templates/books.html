{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Available Books</h2>
    {% if current_user.role == 'admin' %}
    <a href="/add_book" class="btn btn-success">+ Add New Book</a>
    {% endif %}
</div>

<div class="card mb-4">
    <div class="card-body">
        <form class="row g-3">
            <div class="col-md-4">
                <input name="title" class="form-control" placeholder="Filter by Title">
            </div>
            <div class="col-md-3">
                <input name="author" class="form-control" placeholder="Author">
            </div>
            <div class="col-md-3">
                <input name="genre" class="form-control" placeholder="Genre">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100">Search</button>
            </div>
        </form>
    </div>
</div>

<div class="table-responsive bg-white p-3 rounded shadow-sm">
    <table class="table table-hover align-middle">
        <thead class="table-light">
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Copies</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for book in books %}
            <tr>
                <td><strong>{{ book.title }}</strong></td>
                <td>{{ book.author }}</td>
                <td><span class="badge bg-info text-dark">{{ book.copies }} left</span></td>
                <td>
                    <a href="/issue/{{ book.id }}" class="btn btn-sm btn-outline-primary">Issue Book</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
